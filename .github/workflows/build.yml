name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      - name: Accept SDK licenses (extra safety)
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download gradle-wrapper.jar (force fresh)
        run: |
          echo "=== Downloading gradle-wrapper.jar from official Gradle 8.5 release ==="
          mkdir -p gradle/wrapper
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -fL --retry 5 --retry-delay 3 -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar
          if ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "FATAL: gradle-wrapper.jar is corrupted"
            exit 1
          fi
          echo "✓ gradle-wrapper.jar is valid"
          chmod +x gradlew

      - name: Verify gradlew script
        run: |
          echo "=== gradlew first 20 lines ==="
          head -20 gradlew
          echo "=== gradlew file info ==="
          ls -la gradlew
          file gradlew

      - name: Debug info
        run: |
          echo "=== Java version ==="
          java -version
          echo "=== Gradle wrapper properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo "=== Project structure ==="
          ls -la
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighter-browser-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build reports (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          retention-days: 7
          if-no-files-found: warn
